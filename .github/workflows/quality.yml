name: Quality

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bootstrap-tests:
    name: Bootstrap Script Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  encoding:
    name: Encoding Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check Markdown encoding
        run: |
          python3 - <<'PY'
          from pathlib import Path

          suspects = [
              "\u00e2\u20ac\u0153",
              "\u00e2\u20ac\u009d",
              "\u00e2\u20ac\u2122",
              "\u00e2\u20ac\u201d",
              "\u00e2\u20ac\u201c",
              "\u00e2\u20ac\u2022",
              "\ufffd",
          ]
          failures = []

          for path in Path(".").rglob("*.md"):
              text = path.read_text(encoding="utf-8")
              for lineno, line in enumerate(text.splitlines(), 1):
                  if any(token in line for token in suspects):
                      failures.append(f"{path}:{lineno}: {line}")

          if failures:
              print("Potential mojibake found:")
              print("\n".join(failures))
              raise SystemExit(1)
          PY

  markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v20.0.0
        with:
          globs: |
            **/*.md

  links:
    name: Link Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check Links
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: --root-dir ./ --no-progress --verbose './**/*.md'
          fail: true
